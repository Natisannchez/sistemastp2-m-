services:

  redis:
    image: redis:7-alpine
    container_name: mpi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Broker de mensajería ─────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: mpi-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  # ── Catálogo: servidor gRPC ──────────────────────────────────────────────────
  catalogo:
    build:
      context: .                    # raíz del proyecto (para acceder a proto/)
      dockerfile: catalogo/Dockerfile
    image: mpi/catalogo:v1
    container_name: mpi-catalogo
    ports:
      - "50051:50051"
      - "8001:8001"
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_TIMEOUT: "0.2"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── Pedidos: FastAPI REST + gRPC client + RabbitMQ publisher ────────────────
  pedidos:
    build:
      context: .
      dockerfile: pedidos/Dockerfile
    image: mpi/pedidos:v1
    container_name: mpi-pedidos
    ports:
      - "8000:8000"
    environment:
      CATALOGO_ADDR: catalogo:50051  # DNS interno de Docker Compose
      CATALOGO_HTTP_URL: http://catalogo:8001
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      catalogo:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  # ── Notificaciones: consumer de la cola emails ───────────────────────────────
  notificaciones:
    build:
      context: .
      dockerfile: notificaciones/Dockerfile
    image: mpi/notificaciones:v1
    container_name: mpi-notificaciones
    environment:
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: mpi-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      catalogo:
        condition: service_started

  grafana:
    image: grafana/grafana:11.1.3
    container_name: mpi-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
