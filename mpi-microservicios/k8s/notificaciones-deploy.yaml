# ─── Deployment ───────────────────────────────────────────────────────────────
# Notificaciones es un consumer puro: no expone API → no necesita Service.
# Para demostrar persistencia: kubectl scale deployment notificaciones --replicas=0
# Luego volver a escalar y ver que procesa los mensajes pendientes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notificaciones
  labels:
    app: notificaciones
spec:
  replicas: 1                        # escalar horizontalmente agrega consumers
  selector:
    matchLabels:
      app: notificaciones
  template:
    metadata:
      labels:
        app: notificaciones
    spec:
      containers:
        - name: notificaciones
          image: mpi/notificaciones:v1
          imagePullPolicy: Never
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          env:
            - name: RABBIT_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
          livenessProbe:
            exec:
              command:
                - python
                - healthcheck.py
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
